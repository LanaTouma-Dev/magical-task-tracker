<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C490D1"/>
      <stop offset="0.55" stop-color="#B8336A"/>
      <stop offset="1" stop-color="#7E2560"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.46" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#E5FCFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E5FCFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E5FCFF"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="1024" height="1024" fill="black"/>
      <circle cx="470" cy="520" r="248" fill="white"/>
      <circle cx="568" cy="468" r="226" fill="black"/>
    </mask>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>

  <!-- crescent moon -->
  <g mask="url(#crescent)">
    <rect width="1024" height="1024" fill="url(#moon)"/>
  </g>

  <!-- sparkles -->
  <g fill="#FFFFFF">
    <path d="M 0 -1 C 0.2 -0.2, 0.2 -0.2, 1 0 C 0.2 0.2, 0.2 0.2, 0 1 C -0.2 0.2, -0.2 0.2, -1 0 C -0.2 -0.2, -0.2 -0.2, 0 -1 Z" transform="translate(688,322) scale(62)"/>
    <path d="M 0 -1 C 0.2 -0.2, 0.2 -0.2, 1 0 C 0.2 0.2, 0.2 0.2, 0 1 C -0.2 0.2, -0.2 0.2, -1 0 C -0.2 -0.2, -0.2 -0.2, 0 -1 Z" transform="translate(648,560) scale(34)" opacity="0.92"/>
    <path d="M 0 -1 C 0.2 -0.2, 0.2 -0.2, 1 0 C 0.2 0.2, 0.2 0.2, 0 1 C -0.2 0.2, -0.2 0.2, -1 0 C -0.2 -0.2, -0.2 -0.2, 0 -1 Z" transform="translate(726,452) scale(22)" opacity="0.8"/>
  </g>
