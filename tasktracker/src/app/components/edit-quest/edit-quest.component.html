<div class="modal-backdrop" *ngIf="quest" (click)="onBackdrop($event)">
  <div class="modal">

    <div class="modal-header">
      <h2>{{ isNew ? 'New task' : 'Edit task' }}</h2>
      <button class="close-btn" (click)="discard()">
        <lucide-angular name="x" [size]="16" [strokeWidth]="2"></lucide-angular>
      </button>
    </div>

    <div class="modal-body">

      <label class="field">
        <span class="field-label">Title</span>
        <input class="field-input" [(ngModel)]="title" placeholder="What needs to be done?" />
      </label>

      <label class="field">
        <span class="field-label">Notes <span class="hint">(optional)</span></span>
        <textarea class="field-input field-textarea" [(ngModel)]="notes" rows="3"
                  placeholder="Add details, context, links…"></textarea>
      </label>

      <label class="field">
        <span class="field-label">Priority</span>
        <div class="rarity-grid">
          <button *ngFor="let r of rarities"
                  class="rarity-btn"
                  [class]="r.value"
                  [class.selected]="rarity === r.value"
                  (click)="rarity = r.value">
            {{ r.icon }} {{ r.label }}
          </button>
        </div>
      </label>

      <label class="field">
        <span class="field-label">Due Date <span class="hint">(today · fri · 3d · 1w)</span></span>
        <input class="field-input" [(ngModel)]="dueDate" placeholder="e.g. fri, today, 3d" />
      </label>

      <label class="field">
        <span class="field-label">Tags <span class="hint">(space-separated, use #)</span></span>
        <input class="field-input" [(ngModel)]="tagsRaw" placeholder="#work #bug #design" />
      </label>

      <label class="field">
        <span class="field-label">Subtasks
          <span class="hint" *ngIf="subtasks.length">{{ subtasks.length }} step{{ subtasks.length === 1 ? '' : 's' }}</span>
        </span>

        <ul class="sub-edit-list" *ngIf="subtasks.length">
          <li *ngFor="let s of subtasks" class="sub-edit-item">
            <button type="button" class="sub-edit-check" [class.checked]="s.done" (click)="toggleSubtask(s.id)">
              <lucide-angular *ngIf="s.done" name="check" [size]="12" [strokeWidth]="3"></lucide-angular>
            </button>
            <span class="sub-edit-text" [class.done]="s.done">{{ s.title }}</span>
            <button type="button" class="sub-edit-del" (click)="removeSubtask(s.id)" aria-label="Remove subtask">
              <lucide-angular name="x" [size]="13" [strokeWidth]="2.5"></lucide-angular>
            </button>
          </li>
        </ul>

        <div class="sub-edit-add">
          <input class="field-input" [(ngModel)]="newSubtask"
                 (keydown.enter)="$event.preventDefault(); addSubtask()"
                 placeholder="Add a step and press Enter" />
          <button type="button" class="sub-add-btn" (click)="addSubtask()" [disabled]="!newSubtask.trim()">
            <lucide-angular name="plus" [size]="16" [strokeWidth]="2.5"></lucide-angular>
          </button>
        </div>
      </label>

    </div>

    <div class="modal-footer">
      <button class="btn-discard" (click)="discard()">Discard</button>
      <button class="btn-save" (click)="save()" [disabled]="!title.trim()">{{ isNew ? 'Add' : 'Save' }}</button>
    </div>

  </div>
</div>
