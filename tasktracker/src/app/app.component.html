<span class="sparkle" *ngFor="let s of sparkles; let i = index; trackBy: trackByIndex"
      [class]="'sparkle s' + (i+1)">{{ s }}</span>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">🌙</div>
      <div class="brand-text">
        <h1>Lumina</h1>
      </div>
    </div>

    <div class="player" [class.all-done]="taskPct() === 100">
      <div class="task-progress-wrap">
        <div class="task-progress-labels">
          <span class="task-progress-text">
            {{ taskDone() }}<span class="task-progress-sep">/</span>{{ taskTotal() }} tasks done
          </span>
          <span class="task-progress-celebrate" *ngIf="taskPct() === 100">✦ all done ✦</span>
        </div>
        <div class="task-bar">
          <div class="task-fill" [style.width.%]="taskPct()"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="summon-row">
    <qj-templates (spawn)="spawnFromTemplate($event)"></qj-templates>
    <button class="archive-toggle-btn" (click)="toggleArchive()">
      <lucide-angular name="archive" [size]="14" [strokeWidth]="1.75"></lucide-angular>
      Archive
      <span class="archive-badge" *ngIf="archivedCount().length">{{ archivedCount().length }}</span>
    </button>
    <button class="focus-btn" [class.active]="focusToday()" (click)="toggleFocus()"
            [title]="focusToday() ? 'Show all tasks' : 'Show only what is due today or overdue'">
      <lucide-angular name="target" [size]="14" [strokeWidth]="1.75"></lucide-angular>
      {{ focusToday() ? 'Today only' : 'Today' }}
    </button>
  </div>

  <div class="summon">
    <div class="summon-inner">
      <input class="summon-input"
             [ngModel]="input()"
             (ngModelChange)="onInputChange($event)"
             (keydown)="onSummonKey($event)"
             placeholder="write report fri #work"
             autocomplete="off" />

      <div class="summon-chips">
        <span class="chip" [class.prio]="c.kind==='prio'"
                           [class.date]="c.kind==='date'"
              *ngFor="let c of parsed().chips; trackBy: trackByIndex">{{ c.label }}</span>
      </div>
      <button class="cast-btn" (click)="cast()" [disabled]="!parsed().title.trim()">Add</button>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot dot-c"></span>low</span>
    <span class="legend-item"><span class="legend-dot dot-r"></span>medium</span>
    <span class="legend-item"><span class="legend-dot dot-e"></span>high</span>
    <span class="legend-item"><span class="legend-dot dot-l"></span>critical</span>
    <span class="legend-hint">try: <code>!high</code> · <code>fri</code> · <code>#tag</code> · <code>3d</code></span>
    <qj-spell-sheet></qj-spell-sheet>
  </div>

  <qj-search></qj-search>

  <qj-board (editQuest)="openEdit($event)"></qj-board>

  <qj-edit-quest [quest]="editingQuest()" (closed)="closeEdit()"></qj-edit-quest>
  <app-archive *ngIf="showArchive()"></app-archive>

  <div class="footer">
    <div class="shortcuts">
      <span><span class="kbd">N</span>new task</span>
      <span><span class="kbd">Ctrl</span><span class="kbd">D</span>clone last</span>
      <span><span class="kbd">Enter</span>add</span>
    </div>
    <div class="footer-right">
      <button class="data-btn" (click)="exportTasks()" title="Download a backup of all your tasks">
        <lucide-angular name="download" [size]="13" [strokeWidth]="2"></lucide-angular>
        Export
      </button>
      <button class="data-btn" (click)="importInput.click()" title="Restore tasks from a backup file">
        <lucide-angular name="upload" [size]="13" [strokeWidth]="2"></lucide-angular>
        Import
      </button>
      <input #importInput type="file" accept="application/json,.json" hidden (change)="importTasks($event)" />
    </div>
  </div>
</div>
